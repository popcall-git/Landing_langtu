<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>硬控开箱Landing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060606;
      --bg-soft: #101010;
      --panel: rgba(255,255,255,0.05);
      --panel-strong: rgba(255,255,255,0.08);
      --text: #f4efe8;
      --muted: #b8afa5;
      --line: rgba(255,255,255,0.12);
      --hot: #ff4d2e;
      --hot-2: #ff9a3c;
      --danger: #ff2a6d;
      --shadow: 0 20px 80px rgba(0,0,0,.45);
      --radius: 26px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, rgba(255,77,46,.18), transparent 30%),
        radial-gradient(circle at 90% 10%, rgba(255,42,109,.16), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(255,154,60,.10), transparent 35%),
        linear-gradient(180deg, #0a0a0a 0%, #060606 45%, #090909 100%);
      font-family: "Noto Serif SC", serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .08;
      background-image:
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
    }

    a { color: inherit; text-decoration: none; }
    .wrap { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(20px);
      background: rgba(6,6,6,.65);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: "Oswald", sans-serif;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .brand-badge {
      width: 14px; height: 14px; border-radius: 50%;
      background: linear-gradient(135deg, var(--danger), var(--hot));
      box-shadow: 0 0 24px rgba(255,77,46,.75);
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .hero {
      position: relative;
      padding: 72px 0 34px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      color: #ffe2d8;
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 28px;
      margin-top: 22px;
      align-items: end;
    }

    .headline {
      font-size: clamp(42px, 8vw, 96px);
      line-height: .95;
      margin: 0;
      font-weight: 900;
      letter-spacing: -.03em;
    }

    .headline .stroke {
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,.25);
    }

    .hero-copy {
      margin-top: 20px;
      max-width: 720px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 54px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 700;
      transition: .25s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--danger), var(--hot));
      box-shadow: 0 12px 32px rgba(255,77,46,.28);
    }

    .btn-secondary {
      border-color: rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: var(--text);
    }

    .btn:hover { transform: translateY(-2px); }

    .hero-side {
      padding: 24px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .stat {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
    }

    .stat b {
      display: block;
      font: 700 34px/1 "Oswald", sans-serif;
      margin-bottom: 8px;
      color: #fff3ec;
    }

    .section {
      padding: 30px 0 0;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      margin-bottom: 20px;
    }

    .section-kicker {
      color: #ffb19d;
      text-transform: uppercase;
      letter-spacing: .1em;
      font-size: 12px;
      margin-bottom: 10px;
      display: block;
    }

    .section h2 {
      margin: 0;
      font-size: clamp(28px, 5vw, 52px);
      line-height: 1.02;
    }

    .section p.lead {
      margin: 0;
      color: var(--muted);
      max-width: 680px;
      line-height: 1.8;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
    }

    .video-card {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      min-height: 560px;
      background: #111;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .video-card img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.05) contrast(1.08) brightness(.62);
      transform: scale(1.02);
    }

    .video-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.08) 0%, rgba(0,0,0,.48) 50%, rgba(0,0,0,.90) 100%),
        linear-gradient(135deg, rgba(255,42,109,.12), transparent 35%, rgba(255,77,46,.15) 100%);
      z-index: 1;
    }

    .video-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: end;
      height: 100%;
      padding: 28px;
    }

    .video-tag {
      align-self: flex-start;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.14);
      margin-bottom: auto;
    }

    .play-pill {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin-bottom: 22px;
      background: linear-gradient(135deg, var(--danger), var(--hot));
      box-shadow: 0 20px 45px rgba(255,77,46,.28);
      font-size: 24px;
    }

    .video-card h3 {
      margin: 0 0 12px;
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.08;
    }

    .video-card p {
      margin: 0 0 20px;
      color: #dfd4c8;
      line-height: 1.75;
    }

    .video-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: #fff;
    }

    .community {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-top: 18px;
    }

    .panel {
      padding: 26px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
    }

    .panel h3 {
      margin: 0 0 14px;
      font-size: 28px;
    }

    .panel p, .panel li {
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }

    .list {
      margin: 0;
      padding-left: 20px;
    }

    .comments {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 22px;
    }

    .comment {
      padding: 22px;
      border-radius: 24px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      min-height: 220px;
    }

    .comment-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2f2f2f, #151515);
      border: 1px solid rgba(255,255,255,.1);
      font-family: "Oswald", sans-serif;
      color: #ffd3c8;
    }

    .comment-name {
      font-weight: 700;
    }

    .comment-meta {
      color: #a29487;
      font-size: 13px;
      margin-top: 2px;
    }

    .comment p {
      margin: 0;
      color: #eee4d9;
      line-height: 1.85;
    }

    .cta {
      padding: 32px;
      margin: 34px 0 50px;
      border-radius: 30px;
      background:
        radial-gradient(circle at left top, rgba(255,77,46,.20), transparent 35%),
        linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .cta h3 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.04;
    }

    .cta p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      max-width: 700px;
    }

    .footer {
      padding: 0 0 42px;
      color: #8e8479;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .hero-grid,
      .community,
      .comments,
      .video-grid { grid-template-columns: 1fr; }
      .video-card { min-height: 520px; }
    }

    @media (max-width: 680px) {
      .headline { font-size: 52px; }
      .hero-copy { font-size: 16px; }
      .topbar-inner { align-items: flex-start; flex-direction: column; }
      .nav { flex-wrap: wrap; }
      .video-content { padding: 22px; }
      .cta { padding: 24px; }
    }
  </style>
</head>
